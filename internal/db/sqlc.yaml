version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema:
      - "migrations/000001_init.up.sql"
      - "migrations/000002_events.up.sql"
      - "migrations/000003_deliveries.up.sql"
      - "migrations/000004_delivery_attempts.up.sql"
      - "migrations/000005_endpoint_retry_config.up.sql"
    gen:
      go:
        package: "models"
        out: "../models"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_sql_as_comment: true
        sql_package: "pgx/v5"
